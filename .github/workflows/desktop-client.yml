name: Desktop Client Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        working-directory: ./BlackTeaSpeak-Client
        run: npm install

      - name: Build Tauri Application
        working-directory: ./BlackTeaSpeak-Client
        run: npm run tauri build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Desktop-Windows
          path: |
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/msi/*.msi
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/nsis/*.exe

  build-debian:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - name: Install Git (Required for Checkout)
        run: apt-get update && apt-get install -y git curl sudo

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libopus-dev libxdo-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Frontend Dependencies
        working-directory: ./BlackTeaSpeak-Client
        run: npm install

      - name: Build Tauri Application
        working-directory: ./BlackTeaSpeak-Client
        run: npm run tauri build > tauri-build.log 2>&1 || (cat tauri-build.log && exit 1)

      - name: Push Tauri Build Log
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b tauri-logs-debian-${{ github.run_id }}
          cp ./BlackTeaSpeak-Client/tauri-build.log ./tauri-build.log || true
          git add tauri-build.log
          git commit -m "Tauri log failure" || true
          git push origin tauri-logs-debian-${{ github.run_id }} || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Desktop-Debian
          path: |
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/deb/*.deb
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/appimage/*.AppImage

  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:39
    steps:
      - name: Install Git (Required for Checkout)
        run: dnf install -y git curl sudo

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          dnf install -y webkit2gtk4.1-devel gcc gcc-c++ make openssl-devel gtk3-devel libappindicator-gtk3-devel librsvg2-devel curl wget file alsa-lib-devel opus-devel pkgconf-pkg-config libxdo-devel
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Frontend Dependencies
        working-directory: ./BlackTeaSpeak-Client
        run: npm install

      - name: Build Tauri Application
        working-directory: ./BlackTeaSpeak-Client
        run: npm run tauri build > tauri-build.log 2>&1 || (cat tauri-build.log && exit 1)

      - name: Push Tauri Build Log
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout -b tauri-logs-fedora-${{ github.run_id }}
          cp ./BlackTeaSpeak-Client/tauri-build.log ./tauri-build.log || true
          git add tauri-build.log
          git commit -m "Tauri log failure" || true
          git push origin tauri-logs-fedora-${{ github.run_id }} || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Desktop-Fedora
          path: |
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/rpm/*.rpm
            BlackTeaSpeak-Client/src-tauri/target/release/bundle/appimage/*.AppImage
