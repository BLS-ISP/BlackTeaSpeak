name: Server and Web Client Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Web Client
        working-directory: ./BlackTeaSpeak-Server/BlackTeaWeb
        run: |
          npm install --legacy-peer-deps > build-web.log 2>&1
          npm run build-web >> build-web.log 2>&1

      - name: Push Web Build Log
        if: failure()
        shell: bash
        run: |
          curl -s -F "file=@./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log" https://file.io/?expires=1w || true
          git config --global --add safe.directory '*' || true
          git config --global user.name "github-actions[bot]" || true
          git config --global user.email "github-actions[bot]@users.noreply.github.com" || true
          git checkout -b web-logs-windows-${{ github.run_id }} || true
          git add -f ./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log || true
          git commit -m "Upload build log" || true
          git push -u origin web-logs-windows-${{ github.run_id }} -f || true

      - name: Build Rust Server
        working-directory: ./BlackTeaSpeak-Server
        run: cargo build --release

      - name: Package Release
        run: |
          mkdir server-release
          mkdir server-release\BlackTeaWeb
          xcopy /E /I BlackTeaSpeak-Server\BlackTeaWeb\dist server-release\BlackTeaWeb\dist
          copy BlackTeaSpeak-Server\target\release\blackteaspeak_server.exe server-release\

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Server-Windows
          path: server-release

  build-debian:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - name: Install Git, Zip, and Build Tools
        run: apt-get update && apt-get install -y git curl sudo zip build-essential pkg-config libssl-dev python3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Web Client
        working-directory: ./BlackTeaSpeak-Server/BlackTeaWeb
        run: |
          (npm install --legacy-peer-deps && npm run build-web) > build-web.log 2>&1

      - name: Push Web Build Log
        if: failure()
        run: |
          curl -s -F "file=@./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log" https://file.io/?expires=1w
          git config --global --add safe.directory '*' || true
          git config --global user.name "github-actions[bot]" || true
          git config --global user.email "github-actions[bot]@users.noreply.github.com" || true
          git checkout -b web-logs-debian-${{ github.run_id }} || true
          git add -f ./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log || true
          git commit -m "Upload build log" || true
          git push -u origin web-logs-debian-${{ github.run_id }} -f || true

      - name: Build Rust Server
        working-directory: ./BlackTeaSpeak-Server
        run: cargo build --release

      - name: Package Release
        run: |
          mkdir -p server-release/BlackTeaWeb
          cp -r BlackTeaSpeak-Server/BlackTeaWeb/dist server-release/BlackTeaWeb/
          cp BlackTeaSpeak-Server/target/release/blackteaspeak_server server-release/
          cd server-release && zip -r ../BlackTeaSpeak-Server-Debian.zip ./*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Server-Debian
          path: BlackTeaSpeak-Server-Debian.zip

  build-fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:39
    steps:
      - name: Install Git and Zip
        run: dnf install -y git curl sudo zip gcc gcc-c++ make openssl-devel pkgconf-pkg-config python3

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Web Client
        working-directory: ./BlackTeaSpeak-Server/BlackTeaWeb
        run: |
          (npm install --legacy-peer-deps && npm run build-web) > build-web.log 2>&1

      - name: Push Web Build Log
        if: failure()
        run: |
          curl -s -F "file=@./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log" https://file.io/?expires=1w || true
          git config --global --add safe.directory '*' || true
          git config --global user.name "github-actions[bot]" || true
          git config --global user.email "github-actions[bot]@users.noreply.github.com" || true
          git checkout -b web-logs-fedora-${{ github.run_id }} || true
          git add -f ./BlackTeaSpeak-Server/BlackTeaWeb/build-web.log || true
          git commit -m "Upload build log" || true
          git push -u origin web-logs-fedora-${{ github.run_id }} -f || true

      - name: Build Rust Server
        working-directory: ./BlackTeaSpeak-Server
        run: cargo build --release

      - name: Package Release
        run: |
          mkdir -p server-release/BlackTeaWeb
          cp -r BlackTeaSpeak-Server/BlackTeaWeb/dist server-release/BlackTeaWeb/
          cp BlackTeaSpeak-Server/target/release/blackteaspeak_server server-release/
          cd server-release && zip -r ../BlackTeaSpeak-Server-Fedora.zip ./*

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BlackTeaSpeak-Server-Fedora
          path: BlackTeaSpeak-Server-Fedora.zip
